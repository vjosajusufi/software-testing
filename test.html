<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Test Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 3em;
        }

        p {
            font-size: 1.2em;
        }

        button {
            background-color: white;
            color: #2575fc;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>🚀 GitHub Pages Test</h1>
    <p>If you can see this page online, your GitHub setup works!</p>

    <button onclick="showMessage()">Click Me</button>

    <div id="message"></div>

    <footer>
        <p>Made with ❤️ for testing GitHub Pages</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = "🎉 It works! Your JavaScript is running.";
        }
    </script>

</body>
</html>
